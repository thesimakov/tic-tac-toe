<!doctype html>
<html lang="ru" id="htmlRoot">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffd89a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- Необязательно: числовой id приложения VK, если нет в URL (тест вне iframe). Иначе берётся из запуска / VKWebAppGetLaunchParams. -->
  <meta name="vk-app-id" content="">
  <!-- Для доната голосами сообществу: числовой id группы VK (без минуса). Пусто — форма pay-to-service приложения. -->
  <meta name="vk-donate-group-id" content="">
  <!-- Суммы в голосах для VKWebAppOpenPayForm («отключить рекламу» в модалке перед рекламой). Подстройте под курс и кабинет ВК. -->
  <meta name="vk-ads-week-votes" content="100">
  <meta name="vk-ads-year-votes" content="1500">
  <!-- WebSocket для онлайна (необязательно). Пустой content = берётся адрес из js/game-online.js. Пример: content="wss://ваш-сервис.onrender.com" -->
  <meta name="game-ws-url" content="">
  <!-- Рейтинг VK: полный URL API (например https://ваш-сервер.onrender.com/api/lb/vk). Пусто = тот же origin, что у страницы (удобно при node server.js на :8080). -->
  <meta name="vk-lb-api-url" content="">
  <title>Крестики-нолики</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-anim" aria-hidden="true"></div>

  <div class="welcome-overlay" id="welcomeOverlay" role="dialog" aria-modal="true" aria-labelledby="welcomeTitle" hidden>
    <div class="welcome-blobs" aria-hidden="true">
      <span class="welcome-blob welcome-blob--a"></span>
      <span class="welcome-blob welcome-blob--b"></span>
      <span class="welcome-blob welcome-blob--c"></span>
    </div>
    <div class="welcome-float welcome-float--1" aria-hidden="true">×</div>
    <div class="welcome-float welcome-float--2" aria-hidden="true">○</div>
    <div class="welcome-float welcome-float--3" aria-hidden="true">★</div>
    <div class="welcome-card">
      <div class="welcome-mini-board" aria-hidden="true">
        <span class="welcome-tile">×</span><span class="welcome-tile welcome-tile--o">○</span><span class="welcome-tile">×</span>
        <span class="welcome-tile welcome-tile--o">○</span><span class="welcome-tile">×</span><span class="welcome-tile">○</span>
        <span class="welcome-tile">×</span><span class="welcome-tile welcome-tile--o">○</span><span class="welcome-tile">×</span>
      </div>
      <h1 class="welcome-title" id="welcomeTitle">Крестики-нолики</h1>
      <p class="welcome-sub" id="welcomeSub">Сыграй с роботом или с другом онлайн!</p>
      <button type="button" class="btn welcome-enter-btn accent" id="welcomeEnterBtn">Войти</button>
    </div>
  </div>

  <div class="page-layout">
  <div class="lb-drawer-backdrop" id="lbDrawerBackdrop" hidden aria-hidden="true"></div>
  <aside class="leaderboard-panel" id="leaderboardPanel" aria-labelledby="lbTitle">
    <button type="button" class="lb-drawer-close" id="lbDrawerCloseBtn" aria-label="Закрыть">
      <span class="lb-drawer-close-icon" aria-hidden="true"></span>
    </button>
    <h2 class="leaderboard-panel-title" id="lbTitle">Рейтинг</h2>
    <div class="leaderboard-list" id="leaderboardList"></div>
    <button type="button" class="btn btn-tiny leaderboard-refresh" id="lbRefreshBtn">Обновить</button>
  </aside>
  <main class="app" id="appMain" aria-label="Крестики-нолики">

    <div class="user-bar" id="userBar">
      <div class="lang-switch" id="langSwitchGroup">
        <select id="langSelect" class="lang-select" aria-label=""></select>
      </div>
      <button type="button" class="lb-mobile-toggle" id="lbToggleBtn" aria-expanded="false" aria-controls="leaderboardPanel" title="Рейтинг">
        <svg class="lb-mobile-toggle-svg" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <rect x="4" y="14" width="5" height="7" rx="1.2" fill="currentColor"/>
          <rect x="9.5" y="8" width="5" height="13" rx="1.2" fill="currentColor"/>
          <rect x="15" y="11" width="5" height="10" rx="1.2" fill="currentColor"/>
        </svg>
      </button>
      <span class="user-coins" id="userCoinsWrap" title="">
        <span class="user-coins-label" id="userCoinsLabel"></span>
        <span class="user-coins-value" id="coinsValue">0</span>
      </span>
      <button class="btn btn-login" id="loginBtn" type="button" hidden>Войти</button>
      <button class="btn btn-tiny" id="shopBtn" type="button">Магазин</button>
      <button type="button" class="user-avatar-btn" id="userAvatarBtn" hidden
        aria-haspopup="dialog" aria-expanded="false" aria-controls="profileModal">
        <img class="user-avatar" id="userAvatar" alt="" width="30" height="30" decoding="async" hidden>
      </button>
    </div>

    <header class="app-header">
      <span class="corner-note" aria-hidden="true">5+</span>
      <h1 class="title" id="titleText">Крестики-нолики</h1>
    </header>
    <div class="status" id="status" aria-live="polite"></div>

    <div class="play-side-wrap" id="playSideGroup" role="group" aria-label="Сторона и размер поля">
      <button class="btn active" id="playAsXBtn" type="button" aria-pressed="true">Играть за X</button>
      <button class="btn" id="playAsOBtn" type="button" aria-pressed="false">Играть за O</button>
      <div class="board-size-dropdown">
        <button type="button" class="btn board-size-trigger" id="boardSizeTrigger"
          aria-expanded="false" aria-haspopup="listbox" aria-controls="boardSizePopover">
          <span class="board-size-trigger-title" id="boardSizeTriggerTitle">Размер поля</span>
          <span class="board-size-trigger-sub" id="boardSizeCurrentLabel">3 × 3</span>
        </button>
        <div class="difficulty-popover board-size-popover" id="boardSizePopover"
          role="listbox" aria-label="Размер поля" hidden>
          <div class="board-size-options" id="boardSizeOptions"></div>
        </div>
      </div>
    </div>

    <div class="mode-difficulty-row" id="modeDifficultyRow">
      <div class="difficulty-super-wrap" id="difficultySuperWrap">
        <div class="difficulty-dropdown">
          <button type="button" class="btn difficulty-trigger" id="difficultyTrigger"
            aria-expanded="false" aria-haspopup="true" aria-controls="difficultyPopover">
            <span class="difficulty-trigger-title" id="diffTriggerTitle">Уровень сложности</span>
            <span class="difficulty-trigger-sub" id="difficultyCurrentLabel">Нормально</span>
          </button>
          <div class="difficulty-popover" id="difficultyPopover"
            role="group" aria-label="Выбор уровня сложности робота" hidden>
            <div class="difficulty-super-segments">
              <button class="btn difficulty-super-btn" id="levelEasyBtn" type="button" aria-pressed="false">Легко</button>
              <button class="btn difficulty-super-btn active accent" id="levelNormalBtn" type="button" aria-pressed="true">Нормально</button>
              <button class="btn difficulty-super-btn" id="levelHardBtn" type="button" aria-pressed="false">Сложно</button>
            </div>
          </div>
        </div>
      </div>
      <div class="mode-online-wrap">
        <button type="button" class="btn accent" id="robotModeBtn" aria-pressed="true"></button>
      </div>
    </div>

    <div class="board-wrap">
      <section class="board" id="board" aria-label="Игровое поле 3 на 3"></section>
    </div>

    <div class="stats-bar" id="statsBar" aria-label="Счёт">
      <span class="stats-item stats-wins" id="statsWins">0</span>
      <span class="stats-sep">/</span>
      <span class="stats-item stats-losses" id="statsLosses">0</span>
      <span class="stats-sep">/</span>
      <span class="stats-item stats-draws" id="statsDraws">0</span>
    </div>

    <div class="controls">
      <div class="controls-row--actions">
        <button class="btn" id="resetBtn" type="button">Сброс игры</button>
        <button class="btn" id="newGameBtn" type="button">Новая игра</button>
        <button class="btn" id="hintBtn" type="button">Подсказка</button>
      </div>
    </div>
  </main>
  </div>

  <div class="online-modal-overlay" id="onlinePanel" hidden aria-hidden="true">
    <div class="online-modal-card" role="dialog" aria-modal="true" aria-labelledby="onlineSectionTitle">
      <button type="button" class="shop-dismiss online-panel-dismiss" id="onlinePanelCloseBtn" aria-label="">
        <span class="shop-dismiss-icon" aria-hidden="true"></span>
      </button>
      <div class="online-panel-body">
        <div class="online-panel-head">
          <h2 class="online-modal-heading" id="onlineSectionTitle"></h2>
        </div>
        <p class="online-status" id="onlineStatusText" aria-live="polite"></p>
        <div class="online-actions">
          <button type="button" class="btn" id="findMatchBtn"></button>
          <button type="button" class="btn" id="inviteFriendBtn"></button>
          <button type="button" class="btn online-actions-full" id="cancelSearchBtn" hidden></button>
        </div>
        <div class="online-join-row">
          <input type="text" class="online-code-input" id="joinCodeInput" maxlength="8" autocomplete="off" inputmode="text" spellcheck="false" aria-label="" />
          <button type="button" class="btn" id="joinRoomBtn"></button>
        </div>
        <div class="online-room-row" id="roomCodeRow" hidden>
          <div class="online-room-code-block">
            <span class="room-code-label" id="roomCodeLabel"></span>
            <code class="room-code-value" id="roomCodeText"></code>
          </div>
          <div class="online-room-actions">
            <button type="button" class="btn btn-tiny" id="copyCodeBtn"></button>
            <button type="button" class="btn btn-tiny" id="shareVkBtn" hidden></button>
            <button type="button" class="btn btn-tiny" id="inviteVkBtn" hidden></button>
          </div>
        </div>
        <button type="button" class="btn btn-tiny online-disconnect" id="disconnectOnlineBtn" hidden></button>
        <div class="opponent-row" id="opponentRow" hidden>
          <img class="opponent-avatar" id="opponentAvatarImg" alt="" width="32" height="32" decoding="async" />
          <span class="opponent-name" id="opponentNameText"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="modal ad-notice-modal" id="adNoticeModal" role="dialog" aria-modal="true" aria-labelledby="adNoticeTitle">
    <div class="modal-card">
      <h2 class="modal-title" id="adNoticeTitle">Реклама</h2>
      <p class="modal-text ad-notice-intro" id="adNoticeText"></p>
      <button type="button" class="btn accent ad-notice-ok-main" id="adNoticeOkBtn">Хорошо</button>
      <div class="ad-notice-secondary">
        <div class="ad-notice-disable-row">
          <input type="checkbox" id="adNoticeDisableAdsCb" class="ad-notice-cb" aria-controls="adNoticePayExpand" aria-expanded="false" />
          <label for="adNoticeDisableAdsCb" class="ad-notice-cb-label" id="adNoticeDisableAdsLabel"></label>
        </div>
        <div id="adNoticePayExpand" class="ad-notice-pay-expand" hidden>
          <select id="adNoticeNoAdsPlan" class="ad-notice-plan-select" aria-label="">
            <option value="week"></option>
            <option value="year"></option>
          </select>
          <button type="button" class="btn accent ad-notice-pay-submit" id="adNoticePayBtn"></button>
          <p class="donate-modal-hint donate-modal-hint--vk ad-notice-pay-hint" id="adNoticePayHint" hidden></p>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="resultModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card">
      <h2 class="modal-title" id="modalTitle">Игра окончена</h2>
      <p class="modal-text" id="modalText">Результат</p>
      <button class="btn" id="playAgainBtn" type="button">Сыграть снова</button>
    </div>
  </div>

  <div class="shop-overlay" id="shopOverlay">
    <div class="shop-card">
      <button type="button" class="shop-dismiss" id="shopCloseBtn" aria-label="Закрыть" title="Закрыть">
        <span class="shop-dismiss-icon" aria-hidden="true"></span>
      </button>
      <h2 class="shop-title" id="shopCardTitle">Магазин</h2>
      <p class="shop-coin-rate" id="shopCoinRate"></p>
      <p class="shop-purchase-hint" id="shopPurchaseHint" hidden></p>
      <div class="shop-notice" id="shopCourierBlock">
        <p class="shop-notice-text" id="shopCourierText"></p>
        <a class="btn shop-subscribe" id="shopVkLink" href="https://vk.com/lemnitygame" target="_blank" rel="noopener noreferrer">Подписаться</a>
      </div>
      <div class="shop-items" id="shopItems"></div>
    </div>
  </div>

  <div class="fireworks" id="fireworks" aria-hidden="true">
    <div class="fireworks-confetti" id="fireworksConfetti"></div>
    <div class="fireworks-sparks" id="fireworksSparks"></div>
  </div>
  <div class="celebration-banner" id="celebrationBanner" hidden>Ура! Ты выиграл!</div>
  <div class="wow-layer" id="wowLayer"></div>

  <button type="button" class="donate-fab" id="donateFabBtn" aria-haspopup="dialog" aria-controls="donateModal" aria-expanded="false">
    <span class="donate-fab-coins" aria-hidden="true">
      <span class="donate-fab-coin" style="--dx:-38px; --delay:0s;"></span>
      <span class="donate-fab-coin" style="--dx:-8px; --delay:0.28s;"></span>
      <span class="donate-fab-coin" style="--dx:36px; --delay:0.52s;"></span>
    </span>
    <span class="donate-fab-stage" aria-hidden="true">
      <span class="donate-fab-emoji">🐷</span>
    </span>
  </button>

  <div class="modal donate-modal" id="donateModal" role="dialog" aria-modal="true" aria-labelledby="donateModalTitle">
    <div class="modal-card donate-modal-card">
      <button type="button" class="shop-dismiss donate-modal-close" id="donateModalCloseBtn" aria-label="">
        <span class="shop-dismiss-icon" aria-hidden="true"></span>
      </button>
      <h2 class="modal-title" id="donateModalTitle"></h2>
      <p class="modal-text" id="donateModalText"></p>
      <p class="donate-modal-hint donate-modal-hint--vk" id="donateVkOnlyHint" hidden></p>
      <div class="donate-votes-grid" id="donateVotesGrid" role="group" aria-label="">
        <button type="button" class="btn accent donate-vote-btn" data-votes="1"></button>
        <button type="button" class="btn accent donate-vote-btn" data-votes="5"></button>
        <button type="button" class="btn accent donate-vote-btn" data-votes="10"></button>
        <button type="button" class="btn accent donate-vote-btn" data-votes="50"></button>
        <button type="button" class="btn accent donate-vote-btn donate-vote-btn--wide" data-votes="100"></button>
      </div>
    </div>
  </div>

  <div class="modal profile-modal" id="profileModal" role="dialog" aria-modal="true" aria-labelledby="profileModalHeading">
    <div class="modal-card profile-modal-card">
      <button type="button" class="shop-dismiss profile-modal-close" id="profileModalCloseBtn" aria-label="">
        <span class="shop-dismiss-icon" aria-hidden="true"></span>
      </button>
      <img class="profile-modal-avatar" id="profileModalAvatar" alt="" width="88" height="88" decoding="async" hidden>
      <h2 class="modal-title profile-modal-heading" id="profileModalHeading"></h2>
      <p class="profile-modal-name" id="profileModalName"></p>
      <p class="profile-modal-meta" id="profileModalCoins"></p>
      <p class="profile-modal-meta profile-modal-meta--stats" id="profileModalStats"></p>
      <button type="button" class="btn" id="profileModalOkBtn"></button>
    </div>
  </div>

  <script src="js/game-core.js"></script>
  <script src="js/i18n-cis.js"></script>
  <script src="js/game-ai.js"></script>
  <script src="js/game-ui.js"></script>
  <script src="js/game-online.js"></script>
  <script src="js/yandex-sdk.js"></script>
  <script src="js/vk-sdk.js"></script>
  <script src="js/platform-init.js"></script>
</body>
</html>
